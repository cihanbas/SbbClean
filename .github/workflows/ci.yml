name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: .NET kur
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Bağımlılıkları yükle
        run: dotnet restore SBBClean.slnx

      - name: Build al
        run: dotnet build SBBClean.slnx --no-restore --configuration Release

      - name: Yayınla
        run: dotnet publish SBBClean.API/SBBClean.API.csproj --no-build --configuration Release --output ./publish

      - name: Docker'a giris yap
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker image build et ve push et
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: cihanbas07/sbbclean:latest